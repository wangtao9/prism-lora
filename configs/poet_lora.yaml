### Model
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all

### Dataset
dataset: poet_train
dataset_dir: data
template: qwen2_5
cutoff_len: 256
overwrite_cache: true
preprocessing_num_workers: 4

### Output
output_dir: outputs/poet_lora
logging_steps: 10
save_steps: 200
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true

### Training Hyperparameters
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 3.0e-4
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

### Memory Optimization
flash_attn_fa2: true
gradient_checkpointing: true

### Validation
val_size: 0.1
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 200
