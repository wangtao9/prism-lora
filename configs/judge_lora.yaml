### Model
model_name_or_path: ${base_model}

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### Dataset
dataset: judge_train
dataset_dir: data
template: ${template}
cutoff_len: 512
overwrite_cache: true
preprocessing_num_workers: 4

### Output
output_dir: outputs/judge_lora
logging_steps: 10
save_steps: 200
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true

### Training Hyperparameters
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

### Memory Optimization
flash_attn: ${flash_attn}
gradient_checkpointing: true

### Validation
val_size: 0.1
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 200